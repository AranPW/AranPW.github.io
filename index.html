<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Primera Web</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74b9ff, #81ecec);
      margin: 0;
      padding: 0;
      color: #2d3436;
      text-align: center;
    }

    header {
      background-color: #0984e3;
      color: white;
      padding: 1em 0;
      font-size: 1.5em;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    main {
      padding: 2em;
    }

    button {
      background-color: #00cec9;
      border: none;
      padding: 0.8em 1.5em;
      color: white;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #009999;
    }

    footer {
      margin-top: 3em;
      background-color: #dfe6e9;
      padding: 1em 0;
      font-size: 0.9em;
      color: #636e72;
    }
  </style>
</head>
<body>
  <header>
    🌐 Bienvenido a Mi Web de Prueba
  </header>

  <main>
    <h1>Hola Mundo 👋</h1>
    <p>Esta es una página web de ejemplo creada con HTML, CSS y un poco de estilo.</p>
    <button onclick="saludar()">Haz clic aquí</button>

    <script>
      function saludar() {
        alert('¡Hola! Gracias por visitar mi web 😊');
      }
    </script>
  </main>

  <footer>
    © 2025 - Hecha con ❤️ por Practicant
  </footer>
</body>
</html>
